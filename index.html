<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blackthorne HD Remake</title>
  <meta name="description" content="A HD recreation of the classic DOS game Blackthorne with p5.js">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <main>
    <div id="game-container"></div>
    <div id="ui-overlay">
      <h1>BLACKTHORNE</h1>
      <p><b>[ARROWS]</b> Move | <b>[UP]</b> Cover/Climb | <b>[DOWN]</b> Crouch</p>
      <p><b>[S]</b> Draw/Sheathe Weapon | <b>[C]</b> Flip Sprite Direction (If AI drew it backwards)</p>
      <p><b>[UNARMED]</b> <b>[SPACE/F]</b> Jump | <b>[Hold D + ARROWS]</b> Run</p>
      <p><b>[ARMED]</b> <b>[SPACE/F]</b> Shoot Forward | <b>[D]</b> Shoot Backward</p>
    </div>
  </main>
  <script src="sketch.js"></script>
</body>
</html>
